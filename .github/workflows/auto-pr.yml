name: Auto PR for Claude branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          # 既存のPRがあればスキップ
          EXISTING=$(gh pr list --repo "$REPO" --head "$BRANCH" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for $BRANCH"
            exit 0
          fi

          gh pr create \
            --repo "$REPO" \
            --base main \
            --head "$BRANCH" \
            --title "$BRANCH" \
            --body "Automated PR from branch \`$BRANCH\`"
